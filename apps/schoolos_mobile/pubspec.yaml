name: schoolos_mobile
description: "SchoolOS role-based mobile companion app for parents, students, teachers, drivers, staff, and admins."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  firebase_messaging: ^16.0.3
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  geolocator: ^14.0.2
  go_router: ^16.2.1
  image_picker: ^1.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  mobile_scanner: ^7.0.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.7.1
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
