<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c2d12" />
    <meta name="robots" content="noindex" />
    <title>SchoolOS is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      main {
        width: min(100%, 31rem);
        border: 1px solid #fed7aa;
        border-radius: 1.5rem;
        background: #fff;
        padding: 2rem;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      .mark {
        width: 3.5rem;
        height: 3.5rem;
        display: grid;
        place-items: center;
        border-radius: 1rem;
        background: #ffedd5;
        color: #7c2d12;
        font-size: 1.5rem;
        font-weight: 800;
      }
      h1 {
        margin: 1.25rem 0 0.75rem;
        font-size: clamp(1.6rem, 6vw, 2.1rem);
        line-height: 1.15;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.65;
      }
      .safe-note {
        margin-top: 1rem;
        border-radius: 1rem;
        background: #f8fafc;
        padding: 1rem;
        color: #334155;
        font-size: 0.925rem;
      }
      a {
        margin-top: 1.25rem;
        display: inline-flex;
        border-radius: 0.75rem;
        background: #7c2d12;
        padding: 0.75rem 1rem;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      a:focus-visible {
        outline: 3px solid #fdba74;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">S</div>
      <h1>SchoolOS cannot connect</h1>
      <p>
        Reconnect to verify your session and reopen protected school
        workspaces.
      </p>
      <p class="safe-note">
        This public fallback contains no student, staff, finance, file, or
        session information. Attendance drafts already saved on this browser
        are not deleted here.
      </p>
      <a href="/">Try SchoolOS again</a>
    </main>
  </body>
</html>
